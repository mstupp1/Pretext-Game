<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lexicon Crossing</title>
  <meta name="description" content="Navigate streams of flowing prose, collect letters, and spell words in this Frogger-meets-Scrabble game powered by Pretext typography." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="/index.css" />
</head>
<body>
  <div id="game-container">
    <div id="game-wrapper">
      <canvas id="game-canvas"></canvas>
      <div id="book-stats" style="visibility: hidden">
        <div id="hud-left">
          <span id="level-label">Chapter</span>
          <span id="level-value">I</span>
        </div>
        <div id="hud-right">
          <span class="hud-meta-label">Time</span>
          <span id="timer-value">1:30</span>
        </div>
        <div id="hud-center">
          <span id="score-label">Score</span>
          <div id="score-display-group">
            <span id="score-value">0</span>
            <span id="score-target">/ <span id="next-chapter-value">75</span></span>
          </div>
        </div>
        <div id="score-progress-bar">
          <div id="score-progress-fill"></div>
        </div>
      </div>
      <div id="multiplier-legend" style="visibility: hidden">
        <div class="legend-item">
          <div class="legend-tile multiplier-DoubleLetter"></div>
          <span class="legend-label">Double Letter</span>
        </div>
        <div class="legend-item">
          <div class="legend-tile multiplier-TripleLetter"></div>
          <span class="legend-label">Triple Letter</span>
        </div>
        <div class="legend-item">
          <div class="legend-tile multiplier-DoubleWord"></div>
          <span class="legend-label">Double Word</span>
        </div>
        <div class="legend-item">
          <div class="legend-tile multiplier-TripleWord"></div>
          <span class="legend-label">Triple Word</span>
        </div>
      </div>
    </div>
    <div id="ui-overlay">
      <div id="overlay-top">
        <div id="hud"></div>
        <div id="completed-words-container" aria-label="Completed words">
          <div class="ui-container">
            <div id="completed-words-list"></div>
          </div>
        </div>
        <div id="pause-overlay" class="screen-overlay pause-overlay" style="display: none;">
          <div class="pause-panel">
            <h2 id="pause-chapter" class="pause-chapter pause-pixel-text">Chapter I</h2>
            <h1 class="pause-pixel-text">Paused</h1>

            <div class="pause-section">
              <div class="subtitle">Session</div>
              <div class="pause-options">
                <button class="pause-option pause-pixel-text" id="option-resume" type="button">Resume</button>
                <button class="pause-option pause-pixel-text" id="option-restart" type="button">Restart</button>
                <button class="pause-option pause-pixel-text" id="option-quit" type="button">Quit to Menu</button>
              </div>
            </div>

            <div class="pause-section">
              <div class="subtitle">Audio</div>
              <div class="pause-options">
                <button class="pause-option pause-option-toggle pause-pixel-text" id="option-music" type="button">
                  <span class="pause-option-label-group">
                    <span class="pause-option-label">Music</span>
                  </span>
                  <span class="toggle-ui" aria-hidden="true">
                    <span class="toggle-label">On</span>
                    <span class="toggle-switch">
                      <span class="toggle-knob"></span>
                    </span>
                  </span>
                </button>
                <button class="pause-option pause-option-toggle pause-pixel-text" id="option-sfx" type="button">
                  <span class="pause-option-label-group">
                    <span class="pause-option-label">Sound Effects</span>
                  </span>
                  <span class="toggle-ui" aria-hidden="true">
                    <span class="toggle-label">On</span>
                    <span class="toggle-switch">
                      <span class="toggle-knob"></span>
                    </span>
                  </span>
                </button>
              </div>
            </div>

            <div class="pause-section pause-section-debug">
              <div class="subtitle">Debug</div>
              <div class="pause-options">
                <button class="pause-option pause-option-debug pause-pixel-text" id="option-debug-points" type="button">Give Points For Next Level</button>
              </div>
            </div>

            <div class="instructions">
              Press <kbd>ESC</kbd> to resume
            </div>

            <div id="pause-confirm" class="pause-confirm" style="display: none;">
              <div class="pause-confirm-card">
                <div class="subtitle">Confirm</div>
                <h3 id="pause-confirm-title" class="pause-confirm-title pause-pixel-text">Are you sure?</h3>
                <div id="pause-confirm-message" class="pause-confirm-message">
                  Your current run will be lost.
                </div>
                <div class="pause-confirm-options">
                  <button class="pause-option pause-confirm-option pause-pixel-text" id="pause-confirm-no" type="button">No</button>
                  <button class="pause-option pause-confirm-option pause-pixel-text" id="pause-confirm-yes" type="button">Yes</button>
                </div>
                <div class="pause-confirm-hint">
                  Press <kbd>ESC</kbd> to go back
                </div>
              </div>
            </div>
          </div>
        </div>
        <div id="gameover-overlay" class="screen-overlay" style="display: none; background: transparent; pointer-events: none;"></div>
      </div>
      <div id="word-tray">
        <div class="ui-container">
          <div id="word-tray-inner">
            <div id="current-word-area">
              <div id="current-word" class="empty"></div>
              <div id="word-feedback"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
