<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lexicon Crossing</title>
  <meta name="description" content="Navigate streams of flowing prose, collect letters, and spell words in this Frogger-meets-Scrabble game powered by Pretext typography." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="/index.css" />
</head>
<body>
  <div id="game-container">
    <div id="game-wrapper">
      <canvas id="game-canvas"></canvas>
      <div id="multiplier-legend" style="visibility: hidden">
        <div class="legend-item">
          <div class="legend-tile multiplier-DoubleLetter"></div>
          <span class="legend-label">Double Letter</span>
        </div>
        <div class="legend-item">
          <div class="legend-tile multiplier-TripleLetter"></div>
          <span class="legend-label">Triple Letter</span>
        </div>
        <div class="legend-item">
          <div class="legend-tile multiplier-DoubleWord"></div>
          <span class="legend-label">Double Word</span>
        </div>
        <div class="legend-item">
          <div class="legend-tile multiplier-TripleWord"></div>
          <span class="legend-label">Triple Word</span>
        </div>
      </div>
    </div>
    <div id="ui-overlay">
      <div id="overlay-top">
        <div id="hud">
          <div class="ui-container">
            <div id="hud-left" style="visibility: hidden">
              <span id="level-label">CHAPTER</span>
              <span id="level-value">I</span>
            </div>
            <div id="hud-center" style="visibility: hidden">
              <span id="score-label">SCORE</span>
              <div id="score-display-group">
                <span id="score-value">0</span>
                <span id="score-target">/ <span id="next-chapter-value">75</span></span>
              </div>
            </div>
            <div id="hud-right" style="visibility: hidden">
              <span id="timer-value">1:30</span>
            </div>
          </div>
          <div id="score-progress-bar" style="visibility: hidden">
            <div id="score-progress-fill"></div>
          </div>
        </div>
        <div id="completed-words-container" aria-label="Completed words">
          <div class="ui-container">
            <div id="completed-words-list"></div>
          </div>
        </div>
        <div id="pause-overlay" class="screen-overlay" style="display: none; background: rgba(245, 241, 232, 0.85);">
          <h1>Paused</h1>
          <div class="subtitle" style="margin-bottom: 20px;">Options</div>

          <div class="pause-options" style="display: flex; flex-direction: column; gap: 16px; margin-bottom: 40px;">
            <div class="pause-option" id="option-music" tabindex="0" style="font-family: var(--font-display); font-size: 24px; cursor: pointer; transition: color 0.2s;">
              <span class="status" style="display: inline-block; width: 40px;">[ ]</span> Mute Music
            </div>
            <div class="pause-option" id="option-sfx" tabindex="0" style="font-family: var(--font-display); font-size: 24px; cursor: pointer; transition: color 0.2s;">
              <span class="status" style="display: inline-block; width: 40px;">[ ]</span> Mute Sound Effects (SFX)
            </div>
          </div>

          <div class="instructions">
            Press <kbd>ESC</kbd> to resume
          </div>
        </div>
        <div id="gameover-overlay" class="screen-overlay" style="display: none; background: transparent; pointer-events: none;"></div>
      </div>
      <div id="word-tray">
        <div class="ui-container">
          <div id="word-tray-inner">
            <div id="current-word-area">
              <div id="current-word" class="empty"></div>
              <div id="word-feedback"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
